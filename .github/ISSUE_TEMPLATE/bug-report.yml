name: Bug Report
description: Report incorrect information, broken links, or formatting issues
labels: ["bug"]
body:
  - type: input
    id: affected-area
    attributes:
      label: Affected Area
      description: Which file or section is affected?
      placeholder: "e.g., english.md Section 4, assets/01-architecture-overview.svg"
    validations:
      required: true

  - type: dropdown
    id: issue-type
    attributes:
      label: Issue Type
      options:
        - Incorrect information
        - Broken link
        - Formatting issue
        - Missing content
        - Code example error
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe the issue clearly
      placeholder: "What is wrong and what did you expect?"
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      description: How can we find or reproduce this issue?
      placeholder: |
        1. Open english.md
        2. Navigate to Section 4
        3. Follow the code example in "Animation System"
        4. Observe the error
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: What should be correct?

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Relevant environment details if applicable
      placeholder: |
        - OS: macOS 15.x
        - Node.js: 22.x
        - Remotion: 4.x

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 550" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c1220"/>
      <stop offset="100%" stop-color="#1a1035"/>
    </linearGradient>
    <filter id="sh2"><feDropShadow dx="0" dy="3" stdDeviation="4" flood-opacity="0.25"/></filter>
  </defs>

  <rect width="1200" height="550" fill="url(#bg2)" rx="12"/>
  <text x="600" y="42" text-anchor="middle" fill="#e2e8f0" font-size="22" font-weight="700" letter-spacing="1">REMOTION ANIMATION SYSTEM — QUICK REFERENCE</text>
  <line x1="380" y1="54" x2="820" y2="54" stroke="#a78bfa" stroke-width="2" opacity="0.5"/>

  <!-- Column 1: useCurrentFrame + interpolate -->
  <rect x="30" y="75" width="370" height="450" rx="10" fill="#161630" stroke="#818cf8" stroke-width="1" filter="url(#sh2)"/>
  <rect x="30" y="75" width="370" height="38" rx="10" fill="#312e81"/>
  <text x="215" y="100" text-anchor="middle" fill="#c4b5fd" font-size="14" font-weight="700">FRAME-DRIVEN ANIMATION</text>

  <!-- interpolate box -->
  <rect x="50" y="125" width="330" height="85" rx="8" fill="#1e1b4b" stroke="#6366f1" stroke-width="1"/>
  <text x="65" y="148" fill="#a5b4fc" font-size="13" font-weight="700">interpolate()</text>
  <text x="65" y="170" fill="#94a3b8" font-size="11" font-family="JetBrains Mono, monospace">interpolate(frame, [0,30], [0,1],</text>
  <text x="65" y="188" fill="#94a3b8" font-size="11" font-family="JetBrains Mono, monospace">  { extrapolateRight: "clamp" })</text>
  <text x="350" y="200" text-anchor="end" fill="#6366f1" font-size="9">maps input range → output range</text>

  <!-- spring box -->
  <rect x="50" y="220" width="330" height="85" rx="8" fill="#1e1b4b" stroke="#8b5cf6" stroke-width="1"/>
  <text x="65" y="243" fill="#c4b5fd" font-size="13" font-weight="700">spring()</text>
  <text x="65" y="265" fill="#94a3b8" font-size="11" font-family="JetBrains Mono, monospace">spring({ frame, fps,</text>
  <text x="65" y="283" fill="#94a3b8" font-size="11" font-family="JetBrains Mono, monospace">  config: { mass: 1, damping: 10 } })</text>
  <text x="350" y="295" text-anchor="end" fill="#8b5cf6" font-size="9">physics-based 0→1 with overshoot</text>

  <!-- Easing box -->
  <rect x="50" y="315" width="330" height="70" rx="8" fill="#1e1b4b" stroke="#a78bfa" stroke-width="1"/>
  <text x="65" y="338" fill="#d8b4fe" font-size="13" font-weight="700">Easing Curves</text>
  <text x="65" y="358" fill="#94a3b8" font-size="11" font-family="JetBrains Mono, monospace">Easing.bezier(0.25, 0.1, 0.25, 1)</text>
  <text x="350" y="372" text-anchor="end" fill="#a78bfa" font-size="9">cubic-bezier + ease / inOut presets</text>

  <!-- interpolateColors -->
  <rect x="50" y="395" width="330" height="70" rx="8" fill="#1e1b4b" stroke="#c084fc" stroke-width="1"/>
  <text x="65" y="418" fill="#e9d5ff" font-size="13" font-weight="700">interpolateColors()</text>
  <text x="65" y="438" fill="#94a3b8" font-size="11" font-family="JetBrains Mono, monospace">interpolateColors(frame, [0,30],</text>
  <text x="65" y="453" fill="#94a3b8" font-size="11" font-family="JetBrains Mono, monospace">  ["#ff0000", "#0000ff"])</text>

  <!-- Column 2: Composition Primitives -->
  <rect x="415" y="75" width="370" height="450" rx="10" fill="#161630" stroke="#f472b6" stroke-width="1" filter="url(#sh2)"/>
  <rect x="415" y="75" width="370" height="38" rx="10" fill="#831843"/>
  <text x="600" y="100" text-anchor="middle" fill="#fbcfe8" font-size="14" font-weight="700">COMPOSITION PRIMITIVES</text>

  <rect x="435" y="125" width="330" height="65" rx="8" fill="#2e1b3b" stroke="#ec4899" stroke-width="1"/>
  <text x="450" y="148" fill="#f9a8d4" font-size="13" font-weight="700">&lt;Sequence from={30} durationInFrames={60}&gt;</text>
  <text x="450" y="170" fill="#94a3b8" font-size="11">Time-shift children. Nested frames reset to 0.</text>
  <text x="735" y="180" text-anchor="end" fill="#ec4899" font-size="9">★ Most used primitive</text>

  <rect x="435" y="200" width="330" height="55" rx="8" fill="#2e1b3b" stroke="#f472b6" stroke-width="1"/>
  <text x="450" y="223" fill="#f9a8d4" font-size="13" font-weight="700">&lt;Series&gt;</text>
  <text x="450" y="241" fill="#94a3b8" font-size="11">Sequential playback. Each child auto-offset.</text>

  <rect x="435" y="265" width="330" height="55" rx="8" fill="#2e1b3b" stroke="#f472b6" stroke-width="1"/>
  <text x="450" y="288" fill="#f9a8d4" font-size="13" font-weight="700">&lt;Loop durationInFrames={60} times={3}&gt;</text>
  <text x="450" y="306" fill="#94a3b8" font-size="11">Repeat children. Infinite if times omitted.</text>

  <rect x="435" y="330" width="330" height="55" rx="8" fill="#2e1b3b" stroke="#f472b6" stroke-width="1"/>
  <text x="450" y="353" fill="#f9a8d4" font-size="13" font-weight="700">&lt;Freeze frame={0}&gt;</text>
  <text x="450" y="371" fill="#94a3b8" font-size="11">Hold at specific frame. Great for pauses.</text>

  <rect x="435" y="395" width="330" height="55" rx="8" fill="#2e1b3b" stroke="#f472b6" stroke-width="1"/>
  <text x="450" y="418" fill="#f9a8d4" font-size="13" font-weight="700">&lt;TransitionSeries&gt;</text>
  <text x="450" y="436" fill="#94a3b8" font-size="11">Slide, fade, wipe between scenes.</text>

  <rect x="435" y="460" width="330" height="55" rx="8" fill="#2e1b3b" stroke="#f472b6" stroke-width="1"/>
  <text x="450" y="483" fill="#f9a8d4" font-size="13" font-weight="700">&lt;AbsoluteFill&gt;</text>
  <text x="450" y="501" fill="#94a3b8" font-size="11">Full-frame positioned container. Layer stack.</text>

  <!-- Column 3: Media & Audio -->
  <rect x="800" y="75" width="370" height="450" rx="10" fill="#161630" stroke="#fb923c" stroke-width="1" filter="url(#sh2)"/>
  <rect x="800" y="75" width="370" height="38" rx="10" fill="#7c2d12"/>
  <text x="985" y="100" text-anchor="middle" fill="#fed7aa" font-size="14" font-weight="700">MEDIA &amp; AUDIO</text>

  <rect x="820" y="125" width="330" height="65" rx="8" fill="#2e1b1b" stroke="#f97316" stroke-width="1"/>
  <text x="835" y="148" fill="#fdba74" font-size="13" font-weight="700">&lt;Html5Audio src={music} /&gt;</text>
  <text x="835" y="170" fill="#94a3b8" font-size="11">Synced audio. Use volume prop for fades.</text>

  <rect x="820" y="200" width="330" height="65" rx="8" fill="#2e1b1b" stroke="#f97316" stroke-width="1"/>
  <text x="835" y="223" fill="#fdba74" font-size="13" font-weight="700">&lt;OffthreadVideo src={clip} /&gt;</text>
  <text x="835" y="241" fill="#94a3b8" font-size="11">Preferred video embed. Rust-accelerated</text>
  <text x="835" y="255" fill="#94a3b8" font-size="11">frame extraction. Better than Html5Video.</text>

  <rect x="820" y="275" width="330" height="80" rx="8" fill="#2e1b1b" stroke="#fb923c" stroke-width="1"/>
  <text x="835" y="298" fill="#fdba74" font-size="13" font-weight="700">visualizeAudio()</text>
  <text x="835" y="318" fill="#94a3b8" font-size="11">FFT spectrum → [0..1] amplitudes array.</text>
  <text x="835" y="336" fill="#94a3b8" font-size="11">Bar charts, waveforms, reactive particles.</text>
  <text x="1120" y="345" text-anchor="end" fill="#fb923c" font-size="9">@remotion/media-utils</text>

  <rect x="820" y="365" width="330" height="65" rx="8" fill="#2e1b1b" stroke="#fb923c" stroke-width="1"/>
  <text x="835" y="388" fill="#fdba74" font-size="13" font-weight="700">visualizeAudioWaveform()</text>
  <text x="835" y="408" fill="#94a3b8" font-size="11">Time-domain waveform. Best for voice.</text>
  <text x="835" y="422" fill="#94a3b8" font-size="11">windowInSeconds controls sample window.</text>

  <rect x="820" y="440" width="330" height="75" rx="8" fill="#2e1b1b" stroke="#fb923c" stroke-width="1"/>
  <text x="835" y="463" fill="#fdba74" font-size="13" font-weight="700">staticFile() + &lt;Img&gt;</text>
  <text x="835" y="483" fill="#94a3b8" font-size="11">Load from public/. Images wait for load.</text>
  <text x="835" y="497" fill="#94a3b8" font-size="11">Canvas, SVG, WebGL all supported.</text>

  <!-- Footer -->
  <text x="600" y="540" text-anchor="middle" fill="#475569" font-size="10">WRemotion Animation System Reference Card</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#12122e"/>
    </linearGradient>
    <filter id="sh3"><feDropShadow dx="0" dy="3" stdDeviation="5" flood-opacity="0.3"/></filter>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#64748b"/></marker>
    <marker id="arrH" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#22d3ee"/></marker>
  </defs>

  <rect width="1200" height="480" fill="url(#bg3)" rx="12"/>
  <text x="600" y="40" text-anchor="middle" fill="#e2e8f0" font-size="22" font-weight="700">CLAUDE CODE × REMOTION — PRODUCTION WORKFLOW</text>
  <line x1="380" y1="52" x2="820" y2="52" stroke="#22d3ee" stroke-width="2" opacity="0.4"/>

  <!-- Phase 1: Init -->
  <rect x="30" y="75" width="220" height="170" rx="10" fill="#0f172a" stroke="#22d3ee" stroke-width="1.5" filter="url(#sh3)"/>
  <rect x="30" y="75" width="220" height="32" rx="10" fill="#164e63"/>
  <text x="140" y="96" text-anchor="middle" fill="#a5f3fc" font-size="12" font-weight="700">① SCAFFOLD</text>
  <text x="50" y="125" fill="#67e8f9" font-size="11" font-weight="600">Claude Code prompt:</text>
  <text x="50" y="145" fill="#94a3b8" font-size="10" font-family="monospace">"Initialize a Remotion</text>
  <text x="50" y="160" fill="#94a3b8" font-size="10" font-family="monospace">project with TypeScript,</text>
  <text x="50" y="175" fill="#94a3b8" font-size="10" font-family="monospace">TailwindCSS v4, and</text>
  <text x="50" y="190" fill="#94a3b8" font-size="10" font-family="monospace">audio visualization."</text>
  <text x="140" y="230" text-anchor="middle" fill="#475569" font-size="9">npm init video → scaffold</text>

  <path d="M255,160 L280,160" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Phase 2: Compose -->
  <rect x="285" y="75" width="220" height="170" rx="10" fill="#0f172a" stroke="#a78bfa" stroke-width="1.5" filter="url(#sh3)"/>
  <rect x="285" y="75" width="220" height="32" rx="10" fill="#3b0764"/>
  <text x="395" y="96" text-anchor="middle" fill="#d8b4fe" font-size="12" font-weight="700">② COMPOSE</text>
  <text x="305" y="125" fill="#c084fc" font-size="11" font-weight="600">Claude Code generates:</text>
  <text x="305" y="145" fill="#94a3b8" font-size="10">• React components per scene</text>
  <text x="305" y="162" fill="#94a3b8" font-size="10">• Composition registry (Root.tsx)</text>
  <text x="305" y="179" fill="#94a3b8" font-size="10">• Zod props schemas</text>
  <text x="305" y="196" fill="#94a3b8" font-size="10">• Animation + timing logic</text>
  <text x="305" y="213" fill="#94a3b8" font-size="10">• Audio sync components</text>
  <text x="395" y="230" text-anchor="middle" fill="#475569" font-size="9">All code deterministic</text>

  <path d="M510,160 L535,160" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Phase 3: Preview -->
  <rect x="540" y="75" width="220" height="170" rx="10" fill="#0f172a" stroke="#f472b6" stroke-width="1.5" filter="url(#sh3)"/>
  <rect x="540" y="75" width="220" height="32" rx="10" fill="#831843"/>
  <text x="650" y="96" text-anchor="middle" fill="#fbcfe8" font-size="12" font-weight="700">③ PREVIEW</text>
  <text x="560" y="125" fill="#f9a8d4" font-size="11" font-weight="600">Remotion Studio:</text>
  <text x="560" y="145" fill="#94a3b8" font-size="10">• localhost:3000 live preview</text>
  <text x="560" y="162" fill="#94a3b8" font-size="10">• Timeline scrubbing</text>
  <text x="560" y="179" fill="#94a3b8" font-size="10">• Hot reload on code changes</text>
  <text x="560" y="196" fill="#94a3b8" font-size="10">• Props editor (Zod schemas)</text>
  <text x="560" y="213" fill="#94a3b8" font-size="10">• Render button → GUI export</text>
  <text x="650" y="230" text-anchor="middle" fill="#475569" font-size="9">npx remotion studio</text>

  <path d="M765,160 L790,160" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Phase 4: Render -->
  <rect x="795" y="75" width="180" height="170" rx="10" fill="#0f172a" stroke="#f97316" stroke-width="1.5" filter="url(#sh3)"/>
  <rect x="795" y="75" width="180" height="32" rx="10" fill="#7c2d12"/>
  <text x="885" y="96" text-anchor="middle" fill="#fed7aa" font-size="12" font-weight="700">④ RENDER</text>
  <text x="815" y="125" fill="#fdba74" font-size="11" font-weight="600">CLI or SSR API:</text>
  <text x="815" y="148" fill="#94a3b8" font-size="10" font-family="monospace">npx remotion</text>
  <text x="815" y="165" fill="#94a3b8" font-size="10" font-family="monospace">  render MyComp</text>
  <text x="815" y="182" fill="#94a3b8" font-size="10" font-family="monospace">  --codec h264</text>
  <text x="815" y="199" fill="#94a3b8" font-size="10" font-family="monospace">  --concurrency 4</text>
  <text x="885" y="230" text-anchor="middle" fill="#475569" font-size="9">local / Lambda / CloudRun</text>

  <path d="M980,160 L1005,160" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Phase 5: Output -->
  <rect x="1010" y="75" width="160" height="170" rx="10" fill="#0f172a" stroke="#22c55e" stroke-width="1.5" filter="url(#sh3)"/>
  <rect x="1010" y="75" width="160" height="32" rx="10" fill="#14532d"/>
  <text x="1090" y="96" text-anchor="middle" fill="#86efac" font-size="12" font-weight="700">⑤ OUTPUT</text>
  <text x="1030" y="125" fill="#4ade80" font-size="11" font-weight="600">Deliverables:</text>
  <text x="1030" y="148" fill="#94a3b8" font-size="10">• MP4 / WebM video</text>
  <text x="1030" y="165" fill="#94a3b8" font-size="10">• ProRes (post-prod)</text>
  <text x="1030" y="182" fill="#94a3b8" font-size="10">• PNG sequences</text>
  <text x="1030" y="199" fill="#94a3b8" font-size="10">• Audio-only export</text>
  <text x="1030" y="216" fill="#94a3b8" font-size="10">• GIF animations</text>

  <!-- Iteration loop arrow -->
  <path d="M650,250 C650,300 350,300 350,250" stroke="#22d3ee" stroke-width="1.5" fill="none" stroke-dasharray="6,4" marker-end="url(#arrH)"/>
  <text x="500" y="295" text-anchor="middle" fill="#22d3ee" font-size="10" font-weight="600">ITERATE: Claude Code refines components per feedback</text>

  <!-- Bottom section: CLAUDE.md config -->
  <rect x="30" y="320" width="1140" height="140" rx="10" fill="#0f172a" stroke="#475569" stroke-width="1" filter="url(#sh3)"/>
  <text x="55" y="350" fill="#94a3b8" font-size="13" font-weight="700">📄 CLAUDE.md — Prescriptive Context for Remotion Projects</text>

  <rect x="50" y="365" width="260" height="80" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="65" y="385" fill="#67e8f9" font-size="11" font-weight="600">Project Conventions</text>
  <text x="65" y="403" fill="#94a3b8" font-size="10">• TypeScript strict mode</text>
  <text x="65" y="418" fill="#94a3b8" font-size="10">• 30fps default, 1920×1080</text>
  <text x="65" y="433" fill="#94a3b8" font-size="10">• Component-per-scene pattern</text>

  <rect x="330" y="365" width="260" height="80" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="345" y="385" fill="#67e8f9" font-size="11" font-weight="600">Animation Standards</text>
  <text x="345" y="403" fill="#94a3b8" font-size="10">• Always use useCurrentFrame()</text>
  <text x="345" y="418" fill="#94a3b8" font-size="10">• No CSS transitions (flicker!)</text>
  <text x="345" y="433" fill="#94a3b8" font-size="10">• spring() for organic motion</text>

  <rect x="610" y="365" width="260" height="80" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="625" y="385" fill="#67e8f9" font-size="11" font-weight="600">Asset Management</text>
  <text x="625" y="403" fill="#94a3b8" font-size="10">• staticFile() for public/ assets</text>
  <text x="625" y="418" fill="#94a3b8" font-size="10">• OffthreadVideo for clips</text>
  <text x="625" y="433" fill="#94a3b8" font-size="10">• Preload with prefetch()</text>

  <rect x="890" y="365" width="260" height="80" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="905" y="385" fill="#67e8f9" font-size="11" font-weight="600">Render Config</text>
  <text x="905" y="403" fill="#94a3b8" font-size="10">• codec: h264, crf: 18</text>
  <text x="905" y="418" fill="#94a3b8" font-size="10">• concurrency: os.cpus / 2</text>
  <text x="905" y="433" fill="#94a3b8" font-size="10">• imageFormat: jpeg for speed</text>

  <text x="600" y="475" text-anchor="middle" fill="#475569" font-size="10">Claude Code Agentic Workflow for Remotion</text>
</svg>
